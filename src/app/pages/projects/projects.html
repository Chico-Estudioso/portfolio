<section class="projects">
  <h1 class="section-title">Mis Proyectos</h1>

  <div class="projects-grid">
    @for (project of projects; track project.id) {
      <div class="card">
        <img [src]="project.imageUrl" [alt]="project.title" class="card-img" />
        <div class="card-body">
          <h3>{{ project.title }}</h3>
          <p>{{ project.description }}</p>
          <div class="card-actions">
            <a [href]="project.repoUrl" target="_blank" rel="noopener" class="btn">
              Ver Repositorio
            </a>
            <a [routerLink]="['/projects', project.id]" class="btn btn-reviews">
              Ver Resenas
            </a>
          </div>
        </div>
      </div>
    }
  </div>
</section>
